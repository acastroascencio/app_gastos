name: app_gastos
description: "Sistema de gestión inmobiliaria para mi papa."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Librerías para Firebase (Nube)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  # Librería para WhatsApp y Memoria Local
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true